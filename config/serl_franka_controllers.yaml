/**:
  controller_manager:
    ros__parameters:
      update_rate: 1000
      thread_priority: 98

      joint_state_broadcaster:
        type: joint_state_broadcaster/JointStateBroadcaster

      franka_robot_state_broadcaster:
        type: franka_robot_state_broadcaster/FrankaRobotStateBroadcaster

      joint_position_controller:
        type: serl_franka_controllers/JointPositionController

      cartesian_impedance_controller:
        type: serl_franka_controllers/CartesianImpedanceController

/**:
  franka_robot_state_broadcaster:
    ros__parameters:
      arm_id: "fr3"
      lock_try_count: 5
      lock_sleep_interval: 5
      lock_log_error: true
      lock_update_success: false

/**:
  joint_state_broadcaster:
    ros__parameters:
      joints:
        - fr3_joint1
        - fr3_joint2
        - fr3_joint3
        - fr3_joint4
        - fr3_joint5
        - fr3_joint6
        - fr3_joint7

/**:
  joint_position_controller:
    ros__parameters:
      arm_id: "fr3"
      target_joint_positions: [0.0, -0.785, 0.0, -2.356, 0.0, 1.571, 0.785]
      # ready 位置 使用弧度表示
      # target_joint_positions: [0.0, 0.168, 0.557, -2.193, -1.1723, 1.186, 0.110]
      # STA 任务的标准位置
      k_gains: [600.0, 600.0, 600.0, 600.0, 250.0, 150.0, 50.0]
      d_gains: [50.0, 50.0, 50.0, 50.0, 30.0, 25.0, 15.0]

/**:
  cartesian_impedance_controller:
    ros__parameters:
      arm_id: "fr3"
